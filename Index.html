<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gelatinas Coloridas 🍧</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
}

/* LOGIN */
.login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#ff6f91;
}

.login-box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:250px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* APP */
.app{
  display:none;
}

.sidebar{
  width:90px;
  background:#ff6f91;
  color:white;
  height:100vh;
  padding:10px;
  float:left;
}

.sidebar button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
}

.content{
  margin-left:90px;
  padding:15px;
  background:#f5f5f5;
  min-height:100vh;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.hidden{ display:none; }

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>🔐 Acesso</h2>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="sidebar">
  <button onclick="trocar('vendas')">💰</button>
  <button onclick="trocar('nao')">🚚</button>
  <button onclick="trocar('produtos')">🛍️</button>
  <button onclick="trocar('promo')">🎁</button>
</div>

<div class="content">

<h2>Gelatinas Coloridas do Rodolfo 🍧</h2>

<!-- VENDAS -->
<div id="vendas">
<h3 id="data"></h3>

<input id="nome" placeholder="Nome">
<input id="preco" value="4" type="number">
<input id="desconto" placeholder="Desconto (ex: 0.50)" type="number">

<label><input type="checkbox" id="pago"> Pago</label>
<label><input type="checkbox" id="entregue"> Entregue</label>

<button onclick="salvarVenda()">Salvar</button>

<div id="listaVendas"></div>
</div>

<!-- NÃO ENTREGUES -->
<div id="nao" class="hidden">
<h3>Não Entregues</h3>
<div id="listaNao"></div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="hidden">
<h3>Produtos</h3>

<input id="nomeProd" placeholder="Nome">
<input id="precoProd" value="4" type="number">

<button onclick="addProduto()">Adicionar</button>

<div id="listaProdutos"></div>
</div>

<!-- PROMO -->
<div id="promo" class="hidden">
<h3>Promoções</h3>

<input type="date" id="dataPromo">
<input type="number" id="porcentagem" placeholder="%">

<button onclick="addPromo()">Criar</button>

<div id="listaPromo"></div>
</div>

</div>
</div>

<script>

// 🔐 LOGIN
function entrar(){
  let senha = document.getElementById("senha").value;

  if(senha === "rodolfo408*"){
    localStorage.setItem("logado","sim");
    iniciar();
  }else{
    alert("Senha errada!");
  }
}

function iniciar(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

// se já estiver logado
if(localStorage.getItem("logado") === "sim"){
  iniciar();
}

// DATA
document.getElementById("data").innerText =
"Vendas de Hoje - " + new Date().toLocaleDateString();

// TROCAR ABA
function trocar(id){
  ["vendas","nao","produtos","promo"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// VENDAS
function salvarVenda(){
  let nome = nome.value;
  let preco = parseFloat(preco.value);
  let desconto = parseFloat(desconto.value) || 0;

  let final = preco - desconto;

  let vendas = JSON.parse(localStorage.getItem("vendas")) || [];

  vendas.push({
    nome,
    valor: final,
    pago: pago.checked,
    entregue: entregue.checked
  });

  localStorage.setItem("vendas", JSON.stringify(vendas));
  carregar();
}

function carregar(){
  let vendas = JSON.parse(localStorage.getItem("vendas")) || [];

  listaVendas.innerHTML="";
  listaNao.innerHTML="";

  vendas.forEach((v,i)=>{

    let div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${v.nome} - R$${v.valor.toFixed(2)}<br>
      Pago: ${v.pago} | Entregue: ${v.entregue}
    `;

    listaVendas.appendChild(div);

    if(!v.entregue){
      let d2 = document.createElement("div");
      d2.className="card";
      d2.innerHTML = `
        ${v.nome} - R$${v.valor.toFixed(2)}
        <br>
        <button onclick="entregar(${i})">Entregar</button>
      `;
      listaNao.appendChild(d2);
    }

  });
}

function entregar(i){
  let vendas = JSON.parse(localStorage.getItem("vendas"));
  vendas[i].entregue = true;
  localStorage.setItem("vendas", JSON.stringify(vendas));
  carregar();
}

// PRODUTOS
function addProduto(){
  let nome = nomeProd.value;
  let preco = precoProd.value;

  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

  produtos.push({nome,preco});
  localStorage.setItem("produtos", JSON.stringify(produtos));
  carregarProdutos();
}

function carregarProdutos(){
  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
  listaProdutos.innerHTML="";

  produtos.forEach(p=>{
    let div = document.createElement("div");
    div.className="card";
    div.innerText = `${p.nome} - R$${p.preco}`;
    listaProdutos.appendChild(div);
  });
}

// PROMO
function addPromo(){
  let data = dataPromo.value;
  let porc = porcentagem.value;

  let desconto = 4 * (porc/100);

  let promo = JSON.parse(localStorage.getItem("promo")) || [];

  promo.push({data,porc,desconto});
  localStorage.setItem("promo", JSON.stringify(promo));
  carregarPromo();
}

function carregarPromo(){
  let promo = JSON.parse(localStorage.getItem("promo")) || [];
  listaPromo.innerHTML="";

  promo.forEach(p=>{
    let div = document.createElement("div");
    div.className="card";
    div.innerText = `${p.data} - ${p.porc}% (R$${p.desconto.toFixed(2)})`;
    listaPromo.appendChild(div);
  });
}

carregar();
carregarProdutos();
carregarPromo();

</script>

</body>
</html>
