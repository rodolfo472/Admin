<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gelatinas 🍧</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;display:flex}
.login{display:flex;justify-content:center;align-items:center;height:100vh;background:#ff6f91}
.box{background:white;padding:20px;border-radius:15px}
.sidebar{width:90px;background:#ff6f91;height:100vh;padding:10px}
.sidebar button{display:block;margin:10px 0;width:100%;padding:10px}
.content{flex:1;padding:15px;background:#f5f5f5}
.card{background:white;padding:10px;border-radius:10px;margin:10px 0}
.hidden{display:none}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="box">
    <h2>🔐 Login</h2>
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
<button onclick="aba('vendas')">💰</button>
<button onclick="aba('naoEntregue')">🚚</button>
<button onclick="aba('naoPago')">❌</button>
<button onclick="aba('promo')">🎁</button>
<button onclick="aba('pedidos')">📦</button>
<button onclick="telaCheia()">🖥️</button>
</div>

<div class="content">

<h2>Gelatinas do Rodolfo 🍧</h2>

<!-- VENDAS -->
<div id="vendas">
<h3 id="data"></h3>

<input id="nome" placeholder="Nome">
<input id="preco" value="4" type="number">
<input id="desconto" placeholder="Desconto (ex: 0.50)" type="number">

<label><input type="checkbox" id="pago"> Pago</label>
<label><input type="checkbox" id="entregue"> Entregue</label>

<button onclick="salvarVenda()">Salvar</button>

<div id="listaVendas"></div>
</div>

<!-- NÃO ENTREGUES -->
<div id="naoEntregue" class="hidden">
<h3>Não Entregues</h3>
<div id="listaNaoEntregue"></div>
</div>

<!-- NÃO PAGOS -->
<div id="naoPago" class="hidden">
<h3>Não Pagaram</h3>
<div id="listaNaoPago"></div>
</div>

<!-- PROMOÇÕES -->
<div id="promo" class="hidden">
<h3>Promoções</h3>

<input type="date" id="dataPromo">
<input type="number" id="porc" placeholder="%">

<button onclick="criarPromo()">Criar</button>

<div id="listaPromo"></div>
</div>

<!-- PEDIDOS -->
<div id="pedidos" class="hidden">
<h3>Pedidos</h3>
<div id="listaPedidos"></div>
</div>

</div>
</div>

<script>

// LOGIN
function entrar(){
  if(senha.value==="rodolfo408*"){
    localStorage.setItem("logado","sim");
    iniciar();
  }else alert("Senha errada");
}

function iniciar(){
  login.style.display="none";
  app.classList.remove("hidden");
}

if(localStorage.getItem("logado")) iniciar();

// DATA
data.innerText="Vendas de Hoje - "+new Date().toLocaleDateString();

// TROCAR ABA
function aba(id){
  ["vendas","naoEntregue","naoPago","promo","pedidos"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// TELA CHEIA
function telaCheia(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
}

// VENDAS
function salvarVenda(){
  let vendas = JSON.parse(localStorage.getItem("vendas"))||[];

  let valor = parseFloat(preco.value) - (parseFloat(desconto.value)||0);

  vendas.push({
    nome:nome.value,
    valor,
    pago:pago.checked,
    entregue:entregue.checked
  });

  localStorage.setItem("vendas",JSON.stringify(vendas));
  carregar();
}

function carregar(){
  let vendas = JSON.parse(localStorage.getItem("vendas"))||[];

  listaVendas.innerHTML="";
  listaNaoEntregue.innerHTML="";
  listaNaoPago.innerHTML="";

  vendas.forEach((v,i)=>{

    let c = `<div class="card">
    ${v.nome} - R$${v.valor.toFixed(2)}<br>
    Pago: ${v.pago} | Entregue: ${v.entregue}
    </div>`;

    listaVendas.innerHTML+=c;

    if(!v.entregue){
      listaNaoEntregue.innerHTML+=`
      <div class="card">
      ${v.nome}
      <button onclick="entregar(${i})">Entregar</button>
      </div>`;
    }

    if(!v.pago){
      listaNaoPago.innerHTML+=`
      <div class="card">
      ${v.nome}
      </div>`;
    }

  });

  carregarPedidos();
}

function entregar(i){
  let vendas = JSON.parse(localStorage.getItem("vendas"));
  vendas[i].entregue=true;
  localStorage.setItem("vendas",JSON.stringify(vendas));
  carregar();
}

// PROMO
function criarPromo(){
  let promo = JSON.parse(localStorage.getItem("promo"))||[];

  let desconto = 4*(porc.value/100);

  promo.push({
    data:dataPromo.value,
    porc:porc.value,
    desconto
  });

  localStorage.setItem("promo",JSON.stringify(promo));
  carregarPromo();
}

function carregarPromo(){
  let promo = JSON.parse(localStorage.getItem("promo"))||[];
  listaPromo.innerHTML="";

  promo.forEach(p=>{
    listaPromo.innerHTML+=`
    <div class="card">
    ${p.data} - ${p.porc}% (R$${p.desconto.toFixed(2)})
    </div>`;
  });
}

// PEDIDOS (simulado)
function carregarPedidos(){
  let pedidos = JSON.parse(localStorage.getItem("pedidos"))||[];

  listaPedidos.innerHTML="";

  pedidos.forEach((p,i)=>{
    listaPedidos.innerHTML+=`
    <div class="card">
    ${p.nome} - ${p.horario}<br>
    ${p.sabores.join(", ")}<br>
    <button onclick="finalizarPedido(${i})">Entregar</button>
    </div>`;
  });
}

function finalizarPedido(i){
  let pedidos = JSON.parse(localStorage.getItem("pedidos"));
  pedidos.splice(i,1);
  localStorage.setItem("pedidos",JSON.stringify(pedidos));
  carregar();
}

// INICIAR
carregar();
carregarPromo();

</script>

</body>
</html>
