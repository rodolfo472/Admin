<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gelatinas 🍧</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
}

/* MENU LATERAL */
.sidebar{
  width:80px;
  background:#ff6f91;
  height:100vh;
  padding:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.sidebar button{
  margin:10px 0;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* ÁREA PRINCIPAL */
.main{
  flex:1;
  display:flex;
}

/* CONTEÚDO GRANDE */
.content{
  flex:1;
  padding:20px;
  background:#f5f5f5;
}

/* CARDS */
.card{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* ESCONDER */
.hidden{
  display:none;
}

</style>
</head>

<body>

<!-- MENU ESQUERDO -->
<div class="sidebar">
  <button onclick="abrir('vendas')">💰</button>
  <button onclick="abrir('pedidos')">📦</button>
  <button onclick="abrir('promo')">🎁</button>
  <button onclick="abrir('nao')">🚚</button>
</div>

<!-- ÁREA DIREITA -->
<div class="main">

<div class="content">

<h2>Gelatinas do Rodolfo 🍧</h2>

<!-- VENDAS -->
<div id="vendas">
<h3>Vendas</h3>
<input id="nome" placeholder="Nome">
<input id="preco" value="4" type="number">
<input id="desc" placeholder="Desconto">

<label><input type="checkbox" id="pago"> Pago</label>
<label><input type="checkbox" id="entregue"> Entregue</label>

<button onclick="salvar()">Salvar</button>

<div id="lista"></div>
</div>

<!-- PEDIDOS -->
<div id="pedidos" class="hidden">
<h3>Pedidos</h3>
<div id="listaPedidos"></div>
</div>

<!-- PROMO -->
<div id="promo" class="hidden">
<h3>Promoções</h3>

<input type="date" id="data">
<input type="number" id="porc" placeholder="%">

<button onclick="promo()">Criar</button>

<div id="listaPromo"></div>
</div>

<!-- NÃO ENTREGUE -->
<div id="nao" class="hidden">
<h3>Não Entregues</h3>
<div id="listaNao"></div>
</div>

</div>

</div>

<script>

// TROCAR TELA
function abrir(id){
  ["vendas","pedidos","promo","nao"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// VENDAS
function salvar(){
  let vendas = JSON.parse(localStorage.getItem("vendas"))||[];

  let valor = preco.value - (desc.value||0);

  vendas.push({
    nome:nome.value,
    valor,
    pago:pago.checked,
    entregue:entregue.checked
  });

  localStorage.setItem("vendas",JSON.stringify(vendas));
  carregar();
}

function carregar(){
  let vendas = JSON.parse(localStorage.getItem("vendas"))||[];

  lista.innerHTML="";
  listaNao.innerHTML="";

  vendas.forEach((v,i)=>{
    lista.innerHTML+=`
    <div class="card">
    ${v.nome} - R$${v.valor}<br>
    Pago: ${v.pago} | Entregue: ${v.entregue}
    </div>`;

    if(!v.entregue){
      listaNao.innerHTML+=`
      <div class="card">${v.nome}</div>`;
    }
  });

  carregarPedidos();
}

// PEDIDOS
function carregarPedidos(){
  let pedidos = JSON.parse(localStorage.getItem("pedidos"))||[];

  listaPedidos.innerHTML="";

  pedidos.forEach(p=>{
    listaPedidos.innerHTML+=`
    <div class="card">
    ${p.nome} - ${p.horario}
    </div>`;
  });
}

// PROMO
function promo(){
  let p = JSON.parse(localStorage.getItem("promo"))||[];

  let desconto = 4*(porc.value/100);

  p.push({
    data:data.value,
    porc:porc.value,
    desconto
  });

  localStorage.setItem("promo",JSON.stringify(p));
  carregarPromo();
}

function carregarPromo(){
  let p = JSON.parse(localStorage.getItem("promo"))||[];

  listaPromo.innerHTML="";

  p.forEach(x=>{
    listaPromo.innerHTML+=`
    <div class="card">
    ${x.data} - ${x.porc}% (R$${x.desconto})
    </div>`;
  });
}

carregar();
carregarPromo();

</script>

</body>
</html>
