<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gelatinas do Rodolfo 🍧</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;display:flex}
.sidebar{width:90px;background:#ff6f91;height:100vh;padding:10px}
.sidebar button{display:block;margin:10px 0;width:100%;padding:10px;border:none;border-radius:10px}
.content{flex:1;padding:15px;background:#f5f5f5}
.card{background:white;padding:10px;border-radius:10px;margin:10px 0}
.hidden{display:none}
img{border-radius:10px}
textarea{width:100%}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="aba('vendas')">💰</button>
<button onclick="aba('pedidos')">📦</button>
<button onclick="aba('sabores')">🍧</button>
<button onclick="aba('pagamentos')">💳</button>
</div>

<div class="content">

<h2>Admin - Gelatinas do Rodolfo 🍧</h2>

<!-- VENDAS -->
<div id="vendas">
<input id="nome" placeholder="Nome">
<input id="preco" value="4" type="number">
<input id="desc" placeholder="Desconto">
<label><input type="checkbox" id="pago"> Pago</label>
<label><input type="checkbox" id="entregue"> Entregue</label>
<button onclick="salvar()">Salvar</button>
<div id="lista"></div>
</div>

<!-- PEDIDOS -->
<div id="pedidos" class="hidden">
<h3>Pedidos</h3>
<div id="listaPedidos"></div>
</div>

<!-- SABORES -->
<div id="sabores" class="hidden">
<h3>🍧 Sabores</h3>

<input id="nomeSabor" placeholder="Nome do sabor">
<input type="file" id="foto">
<button onclick="addSabor()">Adicionar</button>

<div id="listaSabores"></div>
</div>

<!-- PAGAMENTOS -->
<div id="pagamentos" class="hidden">
<h3>💳 Maquininha PIX</h3>

<input id="valorPagamento" placeholder="Valor (R$)" type="number">

<button onclick="gerarPagamento()">Gerar QR PIX</button>

<div id="qrcode"></div>

<h4>Histórico</h4>
<div id="listaPagamentos"></div>
</div>

</div>

<script>

// trocar aba
function aba(id){
["vendas","pedidos","sabores","pagamentos"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

// vendas
function salvar(){
let v = JSON.parse(localStorage.getItem("vendas"))||[];

let valor = preco.value - (desc.value||0);

v.push({
nome:nome.value,
valor,
pago:pago.checked,
entregue:entregue.checked
});

localStorage.setItem("vendas",JSON.stringify(v));
carregar();
}

function carregar(){
let v = JSON.parse(localStorage.getItem("vendas"))||[];
lista.innerHTML="";
v.forEach(x=>{
lista.innerHTML+=`
<div class="card">
${x.nome} - R$${x.valor}<br>
Pago: ${x.pago} | Entregue: ${x.entregue}
</div>`;
});
carregarPedidos();
carregarSabores();
carregarPagamentos();
}

// pedidos
function carregarPedidos(){
let p = JSON.parse(localStorage.getItem("pedidos"))||[];
listaPedidos.innerHTML="";
p.forEach((x,i)=>{
listaPedidos.innerHTML+=`
<div class="card">
<b>${x.nome}</b><br>
${x.sabor}<br>
${x.horario}<br>
${x.rua}<br>
<button onclick="entregar(${i})">Entregar</button>
</div>`;
});
}

function entregar(i){
let p = JSON.parse(localStorage.getItem("pedidos"));
p.splice(i,1);
localStorage.setItem("pedidos",JSON.stringify(p));
carregar();
}

// sabores
function addSabor(){
let nome = nomeSabor.value;
let file = foto.files[0];

let reader = new FileReader();
reader.onload = function(){
let s = JSON.parse(localStorage.getItem("sabores"))||[];
s.push({nome,img:reader.result});
localStorage.setItem("sabores",JSON.stringify(s));
carregarSabores();
}
if(file) reader.readAsDataURL(file);
}

function carregarSabores(){
let s = JSON.parse(localStorage.getItem("sabores"))||[];
listaSabores.innerHTML="";
s.forEach((x,i)=>{
listaSabores.innerHTML+=`
<div class="card">
<img src="${x.img}" width="80"><br>
${x.nome}<br>
<button onclick="remover(${i})">❌ Remover</button>
</div>`;
});
}

function remover(i){
let s = JSON.parse(localStorage.getItem("sabores"));
s.splice(i,1);
localStorage.setItem("sabores",JSON.stringify(s));
carregarSabores();
}

// 💳 PIX REAL
function gerarPagamento(){
let valor = parseFloat(valorPagamento.value);

if(!valor){
alert("Digite valor!");
return;
}

let chave = "82993223150";
let nome = "RODOLFO";
let cidade = "PIRANHAS";

// CRC16
function crc16(str) {
let crc = 0xFFFF;
for (let c = 0; c < str.length; c++) {
crc ^= str.charCodeAt(c) << 8;
for (let i = 0; i < 8; i++) {
if ((crc & 0x8000) !== 0) {
crc = (crc << 1) ^ 0x1021;
} else {
crc <<= 1;
}
}
}
return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4,'0');
}

let payload =
"000201"+
"26580014BR.GOV.BCB.PIX01"+chave.length.toString().padStart(2,'0')+chave+
"52040000"+
"5303986"+
"54"+valor.toFixed(2).length.toString().padStart(2,'0')+valor.toFixed(2)+
"5802BR"+
"59"+nome.length.toString().padStart(2,'0')+nome+
"60"+cidade.length.toString().padStart(2,'0')+cidade+
"62070503***6304";

let crc = crc16(payload);
let pix = payload + crc;

let qr = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+encodeURIComponent(pix);

qrcode.innerHTML=`
<div class="card">
<h3>📲 Pague com PIX</h3>
<img src="${qr}">
<p>R$ ${valor.toFixed(2)}</p>
<textarea>${pix}</textarea>
</div>`;

// salvar histórico
let p = JSON.parse(localStorage.getItem("pagamentos"))||[];
p.push({valor,data:new Date().toLocaleString()});
localStorage.setItem("pagamentos",JSON.stringify(p));

carregarPagamentos();
}

function carregarPagamentos(){
let p = JSON.parse(localStorage.getItem("pagamentos"))||[];
listaPagamentos.innerHTML="";
p.forEach(x=>{
listaPagamentos.innerHTML+=`
<div class="card">
R$${x.valor} - ${x.data}
</div>`;
});
}

carregar();

</script>

</body>
</html>
